<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced BIR Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px; background: #f8f9fa; color: #212529; min-height: 100vh;
    }

    /* Odoo 19 navbar — white with mauve accent */
    .o-navbar {
      background: #fff; color: #212529; border-bottom: 1px solid #dee2e6;
      height: 46px; display: flex; align-items: center;
      padding: 0 16px; gap: 12px; position: sticky; top: 0; z-index: 100;
    }
    .o-navbar-logo {
      width: 28px; height: 28px; background: #714B67;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .o-navbar-logo svg { width: 16px; height: 16px; }
    .o-navbar-app { font-size: 13px; font-weight: 500; color: #212529; }

    /* Odoo 19 control panel */
    .o-control-panel {
      background: white; border-bottom: 1px solid #dee2e6;
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; min-height: 54px; gap: 16px;
    }
    .o-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #6c757d; flex-wrap: wrap;
    }
    .o-breadcrumb-item { cursor: default; }
    .o-breadcrumb-item.active { color: #212529; font-weight: 500; }
    .o-breadcrumb-sep { color: #adb5bd; font-size: 11px; }
    .o-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Odoo 19 buttons */
    .btn {
      padding: 5px 16px; border-radius: 4px; font-size: 13px;
      font-family: inherit; font-weight: 400; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: #714B67; color: white; border-color: #714B67; }
    .btn-primary:hover { background: #5f3d56; border-color: #5f3d56; }
    .btn-secondary { background: white; color: #212529; border-color: #dee2e6; }
    .btn-secondary:hover { background: #f8f9fa; }
    .btn-loading { opacity: 0.65; cursor: wait; }

    /* Page content */
    .o-content { padding: 24px; }

    /* Odoo 19 form sheet */
    .o-sheet {
      background: white; border-radius: 4px;
      border: 1px solid #dee2e6;
      max-width: 680px; margin: 0 auto; overflow: hidden;
    }
    .o-sheet-header {
      padding: 16px 24px 0; border-bottom: 1px solid #f0ede8; margin-bottom: 0;
    }
    .o-sheet-title { font-size: 18px; font-weight: 500; color: #212529; margin-bottom: 4px; }
    .o-sheet-subtitle { font-size: 12px; color: #6c757d; padding-bottom: 14px; }
    .o-sheet-body { padding: 20px 24px 24px; }

    /* Odoo 19 field groups */
    .o-field-group { margin-bottom: 16px; }
    .o-field-group:last-of-type { margin-bottom: 0; }
    .o-label {
      display: block; font-size: 12px; font-weight: 400;
      color: rgba(0,0,0,0.45); margin-bottom: 4px; text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    select, input[type="month"] {
      width: 100%; padding: 5px 10px; border: 1px solid #dee2e6;
      border-radius: 4px; font-size: 13.5px; font-family: inherit;
      background: white; color: #212529; outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="month"]:focus { border-color: #714B67; }

    .o-row { display: flex; gap: 16px; }
    .o-row > .o-field-group { flex: 1; }

    /* Result banner */
    .result {
      background: #f3eef2; border: 1px solid #d4c5d0; color: #4a2f44;
      padding: 10px 16px; border-radius: 4px; font-size: 13px;
      margin: 12px 0 0; display: none;
    }
    .result.show { display: block; }
    .result.error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }

    /* Tab switcher */
    .o-tabs {
      display: flex; gap: 0; border-bottom: 2px solid #dee2e6;
      padding: 0 24px; background: white;
    }
    .o-tab {
      padding: 10px 20px; font-size: 13px; font-weight: 500;
      color: #6c757d; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s; background: none; border-top: none;
      border-left: none; border-right: none; font-family: inherit;
    }
    .o-tab:hover { color: #212529; }
    .o-tab.active { color: #714B67; border-bottom-color: #714B67; }

    /* eBIRForms status */
    .ebir-status { padding: 10px 16px; border-radius: 4px; font-size: 13px; margin: 12px 0 0; }
    .ebir-status.success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .ebir-status.warning { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; }
    .ebir-status.error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    .ebir-status.info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
  </style>
</head>
<body>

  <!-- Odoo 19 navbar -->
  <nav class="o-navbar">
    <div class="o-navbar-logo">
      <svg viewBox="0 0 16 16" fill="white"><path d="M8 2C4.7 2 2 4.7 2 8s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6zm0 9.5c-1.9 0-3.5-1.6-3.5-3.5S6.1 4.5 8 4.5s3.5 1.6 3.5 3.5S9.9 11.5 8 11.5z"/></svg>
    </div>
    <span class="o-navbar-app">Accounting</span>
  </nav>

  <!-- Odoo 19 control panel -->
  <div class="o-control-panel">
    <div class="o-breadcrumb">
      <span class="o-breadcrumb-item">Reporting</span>
      <span class="o-breadcrumb-sep">›</span>
      <span class="o-breadcrumb-item">Partner Reports</span>
      <span class="o-breadcrumb-sep">›</span>
      <span class="o-breadcrumb-item active">Enhanced BIR Reports</span>
    </div>
    <div class="o-actions">
      <button type="button" class="btn btn-primary" id="btnXlsx">Download XLSX</button>
      <button type="button" class="btn btn-secondary" id="btnDat">Download DAT</button>
    </div>
  </div>

  <!-- Tab switcher -->
  <div class="o-tabs">
    <button class="o-tab active" onclick="switchTab('slsp')">SLSP / QAP</button>
    <button class="o-tab" onclick="switchTab('ebirforms')">eBIRForms</button>
  </div>

  <!-- Page body -->
  <div class="o-content">

    <!-- Tab 1: SLSP / QAP -->
    <div id="tab-slsp">
      <div class="o-sheet">
        <div class="o-sheet-header">
          <div class="o-sheet-title">Enhanced BIR Reports</div>
          <div class="o-sheet-subtitle">SLSP and QAP exports that include journal entries alongside vendor bills</div>
        </div>
        <div class="o-sheet-body">
          <form id="exportForm">
            <div class="o-field-group">
              <label class="o-label">Report</label>
              <select name="report_type">
                <option value="slsp_purchases">SLSP — Purchases (SLP)</option>
                <option value="slsp_sales">SLSP — Sales (SLS)</option>
                <option value="qap">QAP — Quarterly Alphalist of Payees</option>
              </select>
            </div>
            <div class="o-field-group" id="dbGroup" {% if locked_db %}style="display:none"{% endif %}>
              <label class="o-label">Database</label>
              <select name="db_name" id="dbSelect">
                {% for client in clients %}
                <option value="{{ client.db }}" {% if client.db == locked_db %}selected{% endif %}>{{ client.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="o-field-group" id="companyGroup">
              <label class="o-label">Company</label>
              <select name="company_id" id="companySelect">
                <option value="">Loading...</option>
              </select>
            </div>
            <div class="o-field-group">
              <label class="o-label">Period</label>
              <input type="month" name="period" value="{{ default_period }}">
            </div>
            <input type="hidden" name="date_from" id="hiddenDateFrom">
            <input type="hidden" name="date_to" id="hiddenDateTo">
          </form>
          <div id="result" class="result"></div>
        </div>
      </div>
    </div>

    <!-- Tab 2: eBIRForms -->
    <div id="tab-ebirforms" style="display:none">
      <div class="o-sheet">
        <div class="o-sheet-header">
          <div class="o-sheet-title">eBIRForms Generator</div>
          <div class="o-sheet-subtitle">Generate eBIRForms XML files from Odoo tax data</div>
        </div>
        <div class="o-sheet-body">
          <div class="o-field-group">
            <label class="o-label">Form</label>
            <select id="ebirforms_form">
              <optgroup label="Monthly">
                <option value="0619E">0619-E - Expanded WT Monthly</option>
                <option value="0619F">0619-F - Final WT Monthly</option>
              </optgroup>
              <optgroup label="Quarterly">
                <option value="1601EQ">1601-EQ - Expanded WT Quarterly</option>
                <option value="1601FQ">1601-FQ - Final WT Quarterly</option>
              </optgroup>
            </select>
          </div>
          <div class="o-field-group" id="ebirDbGroup" {% if locked_db %}style="display:none"{% endif %}>
            <label class="o-label">Client</label>
            <select id="ebirforms_db" onchange="loadCompaniesEbir(this.value)">
              {% for client in clients %}
              <option value="{{ client.db }}" {% if client.db == locked_db %}selected{% endif %}>{{ client.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="o-field-group" id="ebirforms_company_group" style="display:none">
            <label class="o-label">Company</label>
            <select id="ebirforms_company"></select>
          </div>
          <div class="o-field-group">
            <label class="o-label">Period</label>
            <input type="month" id="ebirforms_period" value="{{ default_period }}">
          </div>
          <div style="margin-top: 16px;">
            <button type="button" class="btn btn-primary" id="btnGenerate" onclick="doGenerate()">Generate</button>
          </div>
          <div id="ebirforms_status" style="display:none; margin-top:16px;"></div>
        </div>
      </div>
    </div>

  </div>
  <script>
    function clearSelect(sel) {
      while (sel.firstChild) sel.removeChild(sel.firstChild);
    }
    function addOption(sel, value, label) {
      var opt = document.createElement('option');
      opt.value = value;
      opt.textContent = label;
      sel.appendChild(opt);
    }
    async function loadCompanies(db) {
      var sel = document.getElementById('companySelect');
      clearSelect(sel);
      addOption(sel, '', 'Loading...');
      try {
        var resp = await fetch('./companies?db=' + encodeURIComponent(db));
        var companies = await resp.json();
        clearSelect(sel);
        companies.forEach(function(c) {
          addOption(sel, c.id, c.name + (c.vat ? ' (' + c.vat + ')' : ''));
        });
        document.getElementById('companyGroup').style.display = companies.length <= 1 ? 'none' : '';
      } catch (err) {
        clearSelect(sel);
        addOption(sel, '', 'Failed to load companies');
      }
    }
    document.getElementById('dbSelect').addEventListener('change', function() {
      loadCompanies(this.value);
    });
    loadCompanies(document.getElementById('dbSelect').value);

    /* Compute date_from / date_to from the month picker */
    function syncPeriod() {
      var val = document.querySelector('[name="period"]').value;
      if (!val) return;
      var parts = val.split('-');
      var year = parseInt(parts[0]), month = parseInt(parts[1]);
      var firstDay = year + '-' + String(month).padStart(2, '0') + '-01';
      var lastDay = new Date(year, month, 0).getDate();
      var lastDate = year + '-' + String(month).padStart(2, '0') + '-' + String(lastDay).padStart(2, '0');
      document.getElementById('hiddenDateFrom').value = firstDay;
      document.getElementById('hiddenDateTo').value = lastDate;
    }
    document.querySelector('[name="period"]').addEventListener('change', syncPeriod);
    syncPeriod();

    async function doExport(format) {
      syncPeriod();
      var btn = format === 'xlsx' ? document.getElementById('btnXlsx') : document.getElementById('btnDat');
      var origText = btn.textContent;
      var resultEl = document.getElementById('result');
      btn.textContent = 'Generating...';
      btn.classList.add('btn-loading');
      btn.disabled = true;
      resultEl.className = 'result';

      var formData = new FormData(document.getElementById('exportForm'));
      formData.set('format', format);

      try {
        var resp = await fetch('./export', { method: 'POST', body: formData });
        if (!resp.ok) {
          var err = await resp.json();
          throw new Error(err.detail || 'Export failed');
        }
        var summary = resp.headers.get('X-Export-Summary') || '';
        if (summary) {
          resultEl.textContent = decodeURIComponent(summary);
          resultEl.className = 'result show';
        }
        var blob = await resp.blob();
        var disposition = resp.headers.get('Content-Disposition') || '';
        var match = disposition.match(/filename="?(.+?)"?$/);
        var filename = match ? match[1] : 'export.xlsx';
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      } catch (err) {
        resultEl.textContent = err.message;
        resultEl.className = 'result show error';
      } finally {
        btn.textContent = origText;
        btn.classList.remove('btn-loading');
        btn.disabled = false;
      }
    }

    document.getElementById('btnXlsx').addEventListener('click', function() { doExport('xlsx'); });
    document.getElementById('btnDat').addEventListener('click', function() { doExport('dat'); });

    /* Tab switching */
    function switchTab(tab) {
      document.getElementById('tab-slsp').style.display = tab === 'slsp' ? '' : 'none';
      document.getElementById('tab-ebirforms').style.display = tab === 'ebirforms' ? '' : 'none';
      document.querySelectorAll('.o-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.o-tab[onclick*="' + tab + '"]').classList.add('active');
      document.querySelector('.o-actions').style.display = tab === 'slsp' ? '' : 'none';
    }

    /* eBIRForms: load companies for selected DB */
    async function loadCompaniesEbir(db) {
      var sel = document.getElementById('ebirforms_company');
      clearSelect(sel);
      addOption(sel, '', 'Loading...');
      try {
        var resp = await fetch('./companies?db=' + encodeURIComponent(db));
        var companies = await resp.json();
        clearSelect(sel);
        companies.forEach(function(c) {
          addOption(sel, c.id, c.name + (c.vat ? ' (' + c.vat + ')' : ''));
        });
        document.getElementById('ebirforms_company_group').style.display = companies.length <= 1 ? 'none' : '';
      } catch (err) {
        clearSelect(sel);
        addOption(sel, '', 'Failed to load');
      }
    }
    loadCompaniesEbir(document.getElementById('ebirforms_db').value);

    /* eBIRForms: generate */
    async function doGenerate() {
      var btn = document.getElementById('btnGenerate');
      var statusEl = document.getElementById('ebirforms_status');
      btn.textContent = 'Generating...';
      btn.classList.add('btn-loading');
      btn.disabled = true;
      statusEl.style.display = 'none';

      var period = document.getElementById('ebirforms_period').value;
      if (!period) { showStatus('error', 'Select a period'); resetBtn(); return; }
      var parts = period.split('-');
      var year = parseInt(parts[0]), month = parseInt(parts[1]);
      var dateFrom = year + '-' + String(month).padStart(2, '0') + '-01';
      var lastDay = new Date(year, month, 0).getDate();
      var dateTo = year + '-' + String(month).padStart(2, '0') + '-' + String(lastDay).padStart(2, '0');

      var formData = new FormData();
      formData.set('form_number', document.getElementById('ebirforms_form').value);
      formData.set('db_name', document.getElementById('ebirforms_db').value);
      formData.set('company_id', document.getElementById('ebirforms_company').value || '0');
      formData.set('date_from', dateFrom);
      formData.set('date_to', dateTo);

      try {
        var resp = await fetch('./ebirforms/generate', { method: 'POST', body: formData });
        if (!resp.ok) {
          var err = await resp.json();
          throw new Error(err.detail || 'Generation failed');
        }
        var data = await resp.json();

        if (data.warnings && data.warnings.length > 0) {
          showStatus('warning', 'Warnings: ' + data.warnings.join('; '));
        }

        var agentOk = false;
        try {
          await sendToAgent(data.savefile);
          await sendToAgent(data.profile);
          agentOk = true;
          showStatus('success', 'Saved: ' + data.savefile.path + ' and ' + data.profile.path);
        } catch (e) {
          downloadFile(data.savefile.name, data.savefile.content);
          downloadFile(data.profile.name, data.profile.content);
          showStatus('info', 'Downloaded ' + data.savefile.name + ' and ' + data.profile.name + ' (local agent not running)');
        }
      } catch (err) {
        showStatus('error', err.message);
      } finally {
        resetBtn();
      }
    }

    function resetBtn() {
      var btn = document.getElementById('btnGenerate');
      btn.textContent = 'Generate';
      btn.classList.remove('btn-loading');
      btn.disabled = false;
    }

    async function sendToAgent(file) {
      var resp = await fetch('http://localhost:5123/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: file.path, content: file.content }),
      });
      if (!resp.ok) throw new Error('Agent error');
    }

    function downloadFile(name, content) {
      var blob = new Blob([content], { type: 'application/xml' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    function showStatus(type, msg) {
      var el = document.getElementById('ebirforms_status');
      el.className = 'ebir-status ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
